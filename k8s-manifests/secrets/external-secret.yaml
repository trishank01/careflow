apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-parameter-store
spec:
  provider:
    aws:
      service: ParameterStore
      region: us-east-1
      auth:
        # Keyless authentication using EKS Pod Identity / IRSA
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: careflow-secrets
  namespace: default
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: careflow-secrets
    creationPolicy: Owner
  data:
  - secretKey: db-user
    remoteRef:
      key: /careflow/dev/db/username
  - secretKey: db-password
    remoteRef:
      key: /careflow/dev/db/password
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: monitoring-secrets
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-parameter-store
    kind: ClusterSecretStore
  target:
    name: monitoring-secrets
    creationPolicy: Owner
  data:
  - secretKey: openai-api-key
    remoteRef:
      key: /careflow/dev/monitoring/openai-api-key
  - secretKey: slack-webhook-url
    remoteRef:
      key: /careflow/dev/monitoring/slack-webhook-url
