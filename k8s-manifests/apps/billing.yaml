# Billing Service Deployment and Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: billing-service
  labels:
    app: billing-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: billing-service
  template:
    metadata:
      labels:
        app: billing-service
    spec:
      containers:
      - name: billing-service
        image: 925216254901.dkr.ecr.us-east-2.amazonaws.com/billing-service:ea634fb3e3dff52fe403d86fbf9535d9b4041b0a
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 6000
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: billing-service
spec:
  type: ClusterIP
  ports:
  - port: 6000
    targetPort: 6000
    protocol: TCP
  selector:
    app: billing-service
